apiVersion: orloj.dev/v1
kind: Task
metadata:
  name: rr-real-tool-retry-task
  namespace: rr-real-tool-retry
spec:
  system: rr-real-tool-retry-system
  input:
    retry_case: transient-stub-500
  priority: high
  retry:
    max_attempts: 2
    backoff: 2s
  message_retry:
    max_attempts: 2
    backoff: 250ms
    max_backoff: 2s
    jitter: full
