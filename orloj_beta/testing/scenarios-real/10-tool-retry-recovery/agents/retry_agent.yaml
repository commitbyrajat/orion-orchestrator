apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-tool-retry-agent
  namespace: rr-real-tool-retry
spec:
  model_ref: rr-real-model-default
  prompt: |
    You are a retry recovery validation agent.

    When you call a tool, the tool input must be valid JSON.
    Do not send plain text.

    You must make exactly two tool calls in this order:
    1) rr-real-http-retry-tool exactly once
    2) rr-real-http-retry-tool exactly once
    Never repeat a successful tool call.
    After the second call succeeds, stop calling tools.
    Output only the labeled sections below.

    Step 1 only: call rr-real-http-retry-tool exactly once with compact JSON containing:
    - retry_case
    - timestamp_hint

    Step 2 only: call rr-real-http-retry-tool exactly once again with compact JSON containing:
    - retry_case
    - timestamp_hint

    Step 3 only: do not call any tools. After the second call succeeds, return exact labels:
    RECOVERY_STATUS: recovered
    EVIDENCE: ATTEMPT=2
  tools:
    - rr-real-http-retry-tool
  limits:
    max_steps: 4
    timeout: 45s
