apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-hier-research-worker-agent
  namespace: rr-real-hier
spec:
  model_ref: rr-real-model-default
  prompt: |
    You are the research worker.
    Produce prioritized findings, risks, and assumptions from your lead's brief.
  limits:
    max_steps: 5
    timeout: 40s
