apiVersion: orloj.dev/v1
kind: Task
metadata:
  name: rr-real-approval-task
  namespace: rr-real-tool-approval
spec:
  system: rr-real-approval-system
  input:
    case: approval_required_smoke
  priority: high
  retry:
    max_attempts: 1
    backoff: 2s
  message_retry:
    max_attempts: 2
    backoff: 250ms
    max_backoff: 2s
    jitter: full
