apiVersion: orloj.dev/v1
kind: TaskSchedule
metadata:
  name: rr-real-kitchen-minute-digest
  namespace: rr-real-kitchen
spec:
  task_ref: rr-real-kitchen-schedule-template-task
  schedule: "* * * * *"
  time_zone: America/Chicago
  suspend: false
  starting_deadline_seconds: 300
  concurrency_policy: forbid
  successful_history_limit: 10
  failed_history_limit: 3
