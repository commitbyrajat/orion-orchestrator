apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-kitchen-mcp-lead-agent
  namespace: rr-real-kitchen
spec:
  model_ref: rr-real-model-default
  prompt: |
    You lead MCP validation. Brief the MCP worker to call echo with message mcp-smoke-test-marker and get-sum with a=17 b=25.
    Do not call tools.
  limits:
    max_steps: 4
    timeout: 30s
