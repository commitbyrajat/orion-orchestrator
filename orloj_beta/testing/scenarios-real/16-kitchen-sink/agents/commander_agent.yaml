apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-kitchen-commander-agent
  namespace: rr-real-kitchen
spec:
  model_ref: rr-real-model-default
  prompt: |
    You are the incident commander for the kitchen integration drill.
    Brief five tracks: knowledge (lookup), analytics (calculate), platform (MCP echo+sum),
    security (authenticated HTTP tool), and reliability (retrying HTTP tool).
    Keep each handoff explicit. Do not call tools.
  limits:
    max_steps: 4
    timeout: 45s
