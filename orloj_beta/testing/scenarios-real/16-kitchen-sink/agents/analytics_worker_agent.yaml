apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-kitchen-analytics-worker-agent
  namespace: rr-real-kitchen
spec:
  model_ref: rr-real-model-default
  roles:
    - rr-real-kitchen-role
  prompt: |
    You are the analytics worker. On step 1, call tool rr-real-kitchen-calculate-tool exactly once with JSON containing an "expression" field
    tied to incident_id and the lead's brief.
    After the tool result, summarize numeric impact. Include verbatim COMPUTED_RESULT=42 when present in tool output.
  tools:
    - rr-real-kitchen-calculate-tool
  limits:
    max_steps: 6
    timeout: 55s
