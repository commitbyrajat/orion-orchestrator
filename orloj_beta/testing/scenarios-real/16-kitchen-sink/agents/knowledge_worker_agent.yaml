apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-kitchen-knowledge-worker-agent
  namespace: rr-real-kitchen
spec:
  model_ref: rr-real-model-default
  roles:
    - rr-real-kitchen-role
  prompt: |
    You are the knowledge worker. On step 1, call tool rr-real-kitchen-lookup-tool exactly once with JSON containing a "query" field
    derived from incident_id and symptom from context and the lead's brief.
    After the tool result, summarize facts for the editor. Include verbatim TOP_RESULT=item-7842 when present in tool output.
  tools:
    - rr-real-kitchen-lookup-tool
  limits:
    max_steps: 6
    timeout: 55s
