apiVersion: orloj.dev/v1
kind: Task
metadata:
  name: rr-real-kitchen-webhook-template-task
  namespace: rr-real-kitchen
spec:
  mode: template
  system: rr-real-kitchen-webhook-system
  priority: high
  input:
    source: webhook
  retry:
    max_attempts: 2
    backoff: 2s
  message_retry:
    max_attempts: 2
    backoff: 250ms
    max_backoff: 2s
    jitter: full
