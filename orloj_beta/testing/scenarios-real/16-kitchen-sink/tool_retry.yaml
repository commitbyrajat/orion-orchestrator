apiVersion: orloj.dev/v1
kind: Tool
metadata:
  name: rr-real-kitchen-retry-tool
  namespace: rr-real-kitchen
spec:
  type: http
  endpoint: http://host.docker.internal:18080/tool/retry-once
  runtime:
    isolation_mode: container
    timeout: 30s
    retry:
      # live_tool_stub: first POST 500, second 200 (same body).
      max_attempts: 2
      backoff: 250ms
      max_backoff: 1s
      jitter: none
