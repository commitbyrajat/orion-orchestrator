apiVersion: orloj.dev/v1
kind: McpServer
metadata:
  name: rr-real-kitchen-mcp
  namespace: rr-real-kitchen
spec:
  transport: stdio
  command: npx
  args:
    - "-y"
    - "@modelcontextprotocol/server-everything"
  tool_filter:
    include:
      - echo
      - get-sum
  reconnect:
    max_attempts: 3
    backoff: 2s
