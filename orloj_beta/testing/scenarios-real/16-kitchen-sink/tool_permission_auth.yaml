apiVersion: orloj.dev/v1
kind: ToolPermission
metadata:
  name: rr-real-kitchen-perm-auth
  namespace: rr-real-kitchen
spec:
  tool_ref: rr-real-kitchen-auth-tool
  action: invoke
  match_mode: all
  apply_mode: global
  required_permissions:
    - tool:rr-real-kitchen-auth-tool:invoke
    - capability:kitchen.tools
