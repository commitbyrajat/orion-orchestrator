apiVersion: orloj.dev/v1
kind: AgentSystem
metadata:
  name: rr-real-loop-system
  namespace: rr-real-loop
spec:
  agents:
    - rr-real-loop-manager-agent
    - rr-real-loop-research-agent
  graph:
    rr-real-loop-manager-agent:
      edges:
        - to: rr-real-loop-research-agent
    rr-real-loop-research-agent:
      edges:
        - to: rr-real-loop-manager-agent
