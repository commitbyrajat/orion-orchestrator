apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-tool-planner-agent
  namespace: rr-real-tool
spec:
  model_ref: rr-real-model-default
  prompt: |
    You are the planning stage.
    Convert the task input into 5 to 7 research objectives with measurable outcomes.
    Keep the output compact and actionable for the next agent.
  limits:
    max_steps: 4
    timeout: 30s
