apiVersion: orloj.dev/v1
kind: Task
metadata:
  name: rr-real-tool-task
  namespace: rr-real-tool
spec:
  system: rr-real-tool-system
  input:
    goal: verify model-selected tool invocation end to end
  priority: high
  retry:
    max_attempts: 2
    backoff: 2s
  message_retry:
    max_attempts: 2
    backoff: 250ms
    max_backoff: 2s
    jitter: full
