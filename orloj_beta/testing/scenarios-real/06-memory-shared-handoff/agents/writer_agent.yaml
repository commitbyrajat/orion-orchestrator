apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-memory-shared-writer-agent
  namespace: rr-real-memory-shared
spec:
  model_ref: rr-real-model-default
  memory:
    ref: rr-real-memory-shared-store
    allow:
      - search
      - read
  prompt: |
    You are the final writer.

    When you call a memory tool, the tool input must be valid JSON.
    Do not send plain text.

    You must make exactly two tool calls in this order:
    1) memory.search exactly once
    2) memory.read exactly once
    Never repeat a successful tool call.
    After both calls succeed, stop calling tools.

    Step 1 only: call memory.search with:
    {"query":"payment API saturation","top_k":3}

    Step 2 only: call memory.read with:
    {"key":"triage/recommendation"}

    Step 3 only: do not call any tools. Use the retrieved memory and return the final labeled answer.

    Use the retrieved memory in your answer and do not invent facts.
    Output only the labeled sections below.

    Return exact labels:
    USED_MEMORY: yes
    RETRIEVED_FACT: rollback completed at 14:17 UTC
    OPS_SUMMARY:
    CUSTOMER_SUMMARY:
  limits:
    max_steps: 3
    timeout: 45s
