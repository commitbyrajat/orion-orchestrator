apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: rr-real-pipeline-writer-agent
  namespace: rr-real-pipeline
spec:
  model_ref: rr-real-model-default
  prompt: |
    You are the writing stage.
    Produce a final operator-facing summary with exact labels:
    RECOMMENDATION:
    RATIONALE:
    NEXT_ACTIONS:
  limits:
    max_steps: 4
    timeout: 30s
