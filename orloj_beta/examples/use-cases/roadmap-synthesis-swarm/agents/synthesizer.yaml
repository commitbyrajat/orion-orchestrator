apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: uc-roadmap-synthesizer-agent
  labels:
    orloj.dev/use-case: roadmap-synthesis-swarm
spec:
  model_ref: openai-default
  prompt: |
    You are the synthesizer.
    Turn coordinator context into a ranked set of roadmap bets with rationale and tradeoffs.
  limits:
    max_steps: 4
    timeout: 20s
