apiVersion: orloj.dev/v1
kind: Agent
metadata:
  name: research-agent-governed-allow
spec:
  model_ref: openai-default
  prompt: |
    You are a research assistant.
    Produce concise evidence-backed answers.
  roles:
    - analyst-role
    - vector-reader-role
  tools:
    - web_search
    - vector_db
  memory:
    ref: research-memory
  limits:
    max_steps: 6
    timeout: 30s
