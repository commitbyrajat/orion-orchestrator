services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "${NATS_PORT:-4222}:4222"
    networks:
      - orloj
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orloj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orloj}
      POSTGRES_DB: ${POSTGRES_DB:-orloj}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orloj
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-orloj} -d ${POSTGRES_DB:-orloj}",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  orlojd:
    build:
      context: .
      dockerfile: Dockerfile
      target: orlojd
    environment:
      ORLOJ_POSTGRES_DSN: ${ORLOJ_POSTGRES_DSN:-postgres://orloj:orloj@postgres:5432/orloj?sslmode=disable}
      ORLOJ_AUTH_MODE: ${ORLOJ_AUTH_MODE:-off}
      ORLOJ_API_TOKEN: ${ORLOJ_API_TOKEN:-}
      ORLOJ_SETUP_TOKEN: ${ORLOJ_SETUP_TOKEN:-}
      ORLOJ_SECRET_ENCRYPTION_KEY: ${ORLOJ_SECRET_ENCRYPTION_KEY:-}
      ORLOJ_LOG_LEVEL: ${ORLOJ_LOG_LEVEL:-info}
      ORLOJ_LOG_FORMAT: ${ORLOJ_LOG_FORMAT:-json}
      ORLOJ_TOOL_ISOLATION_BACKEND: ${ORLOJ_TOOL_ISOLATION_BACKEND:-none}
    command:
      - --addr=:8080
      - --storage-backend=postgres
      - --task-execution-mode=message-driven
      - --event-bus-backend=nats
      - --nats-url=nats://nats:4222
      - --agent-message-bus-backend=nats-jetstream
      - --agent-message-nats-url=nats://nats:4222
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"
    ports:
      - "${ORLOJ_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - orloj
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  orlojworker-a:
    build:
      context: .
      dockerfile: Dockerfile
      target: orlojworker
    environment:
      ORLOJ_POSTGRES_DSN: ${ORLOJ_POSTGRES_DSN:-postgres://orloj:orloj@postgres:5432/orloj?sslmode=disable}
      ORLOJ_LOG_LEVEL: ${ORLOJ_LOG_LEVEL:-info}
      ORLOJ_LOG_FORMAT: ${ORLOJ_LOG_FORMAT:-json}
    command:
      - --storage-backend=postgres
      - --worker-id=worker-a
      - --reconcile-interval=1s
      - --lease-duration=30s
      - --heartbeat-interval=10s
      - --region=default
      - --max-concurrent-tasks=1
      - --task-execution-mode=message-driven
      - --agent-message-bus-backend=nats-jetstream
      - --agent-message-nats-url=nats://nats:4222
      - --agent-message-consume
      - --healthz-addr=:8081
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"
    depends_on:
      postgres:
        condition: service_healthy
      orlojd:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - orloj
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8081/healthz >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  orlojworker-b:
    build:
      context: .
      dockerfile: Dockerfile
      target: orlojworker
    environment:
      ORLOJ_POSTGRES_DSN: ${ORLOJ_POSTGRES_DSN:-postgres://orloj:orloj@postgres:5432/orloj?sslmode=disable}
      ORLOJ_LOG_LEVEL: ${ORLOJ_LOG_LEVEL:-info}
      ORLOJ_LOG_FORMAT: ${ORLOJ_LOG_FORMAT:-json}
    command:
      - --storage-backend=postgres
      - --worker-id=worker-b
      - --reconcile-interval=1s
      - --lease-duration=30s
      - --heartbeat-interval=10s
      - --region=default
      - --max-concurrent-tasks=1
      - --task-execution-mode=message-driven
      - --agent-message-bus-backend=nats-jetstream
      - --agent-message-nats-url=nats://nats:4222
      - --agent-message-consume
      - --healthz-addr=:8081
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"
    depends_on:
      postgres:
        condition: service_healthy
      orlojd:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - orloj
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8081/healthz >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  orloj:
