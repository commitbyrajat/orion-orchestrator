version: 2
updates:
  # Go modules (root)
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      go-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - go

  # Frontend (Bun / npm-compatible package.json)
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - frontend

  # Docs site (Bun / npm-compatible package.json)
  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      docs-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
      - docs

  # Dockerfile base images
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      docker-images:
        patterns:
          - "*"
    labels:
      - dependencies
      - docker

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
