name: trivy

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/bun.lockb"
      - "docs/package.json"
      - "docs/bun.lock"
      - "docs/bun.lockb"
      - ".github/workflows/trivy.yml"
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy filesystem & Dockerfile scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Dependency/manifest vulnerability scan (Go modules, package.json, etc.).
      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # Dockerfile misconfiguration scan (root user, missing healthcheck, etc.).
      - name: Trivy Dockerfile config scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH

      - name: Upload Dockerfile config SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always() && hashFiles('trivy-config.sarif') != ''
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      # Gate the PR on fixable CRITICAL/HIGH dependency CVEs.
      - name: Trivy filesystem gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scanners: vuln
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
