name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # Matches previous paths-ignore: skip heavy jobs when only docs/** or repo-root *.md changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!/*.md'

  build-and-test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip (docs or root markdown only)
        if: needs.changes.outputs.code != 'true'
        run: echo "No code paths changed in this event; skipping build and test."

      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Setup Bun
        if: needs.changes.outputs.code == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install frontend dependencies
        if: needs.changes.outputs.code == 'true'
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend (for Go embed)
        if: needs.changes.outputs.code == 'true'
        run: cd frontend && bun run build

      - name: Build
        if: needs.changes.outputs.code == 'true'
        run: go build ./...

      - name: Test
        if: needs.changes.outputs.code == 'true'
        run: go test ./... -count=1 -timeout 120s

      - name: Validate example manifests (orlojctl)
        if: needs.changes.outputs.code == 'true'
        run: go run ./cmd/orlojctl validate -f examples/

      - name: Vet
        if: needs.changes.outputs.code == 'true'
        run: go vet ./...

      - name: Govulncheck (Go dependency & stdlib CVEs)
        if: needs.changes.outputs.code == 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Verify CRD manifests are up to date
        if: needs.changes.outputs.code == 'true'
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.21.0
          make generate-crds
          git diff --exit-code config/crd/bases/ || {
            echo "::error::CRD manifests are stale. Run 'make generate-crds' and commit the result."
            exit 1
          }

      - name: Operator integration tests (envtest)
        if: needs.changes.outputs.code == 'true'
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          KUBEBUILDER_ASSETS="$(setup-envtest use -p path)" go test ./crds/... -count=1 -timeout 120s

      - name: Validate OpenAPI spec
        if: needs.changes.outputs.code == 'true'
        run: npx --yes @redocly/cli@1.28.5 lint openapi/openapi.yaml

  reliability:
    needs: [changes, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Skip (docs or root markdown only)
        if: needs.changes.outputs.code != 'true'
        run: echo "No code paths changed in this event; skipping reliability suite."

      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Setup Bun
        if: needs.changes.outputs.code == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install frontend dependencies
        if: needs.changes.outputs.code == 'true'
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend (for Go embed)
        if: needs.changes.outputs.code == 'true'
        run: cd frontend && bun run build

      - name: Build server
        if: needs.changes.outputs.code == 'true'
        run: go build -o orlojd ./cmd/orlojd

      - name: Start orlojd (memory backend, embedded worker)
        if: needs.changes.outputs.code == 'true'
        run: |
          ./orlojd \
            --storage-backend=memory \
            --run-task-worker \
            --task-worker-id=ci-worker \
            --reconcile-interval=1s \
            --addr=:8080 &
          echo "ORLOJD_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for healthy server
        if: needs.changes.outputs.code == 'true'
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/healthz > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to become healthy within 30s"
          exit 1

      - name: Run load test (SLO quality gates)
        if: needs.changes.outputs.code == 'true'
        run: |
          go run ./cmd/orloj-loadtest \
            --base-url=http://127.0.0.1:8080 \
            --namespace=default \
            --tasks=30 \
            --quality-profile=monitoring/loadtest/quality-ci.json \
            --min-ready-workers=1 \
            --worker-ready-timeout=30s \
            --run-timeout=3m \
            --json

      - name: Run alert check
        if: needs.changes.outputs.code == 'true'
        run: |
          go run ./cmd/orloj-alertcheck \
            --base-url=http://127.0.0.1:8080 \
            --namespace=default \
            --profile=monitoring/alerts/retry-deadletter-ci.json \
            --json

      - name: Stop server
        if: always() && needs.changes.outputs.code == 'true'
        run: |
          if [ -n "$ORLOJD_PID" ]; then
            kill "$ORLOJD_PID" 2>/dev/null || true
            wait "$ORLOJD_PID" 2>/dev/null || true
          fi
