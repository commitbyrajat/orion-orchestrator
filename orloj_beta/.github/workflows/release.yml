name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend (for Go embed)
        run: cd frontend && bun run build

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

      - name: Vet
        run: go vet ./...

  goreleaser:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate SBOM and attach to release
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: orloj-${{ github.ref_name }}-sbom.spdx.json
          upload-release-assets: "true"
          upload-artifact: "true"

  images:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image names and build date
        id: reg
        run: |
          o=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_orlojd=ghcr.io/${o}/orloj-orlojd" >> "$GITHUB_OUTPUT"
          echo "image_worker=ghcr.io/${o}/orloj-orlojworker" >> "$GITHUB_OUTPUT"
          echo "image_operator=ghcr.io/${o}/orloj-operator" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (orlojd)
        id: meta-orlojd
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.reg.outputs.image_orlojd }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push orlojd
        id: push-orlojd
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          target: orlojd
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-orlojd.outputs.tags }}
          labels: ${{ steps.meta-orlojd.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.reg.outputs.date }}
          provenance: mode=max
          sbom: true

      - name: Docker meta (orlojworker)
        id: meta-worker
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.reg.outputs.image_worker }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push orlojworker
        id: push-worker
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          target: orlojworker
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.reg.outputs.date }}
          provenance: mode=max
          sbom: true

      - name: Docker meta (orloj-operator)
        id: meta-operator
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.reg.outputs.image_operator }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push orloj-operator
        id: push-operator
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          target: orloj-operator
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.reg.outputs.date }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign orlojd image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ steps.reg.outputs.image_orlojd }}@${{ steps.push-orlojd.outputs.digest }}"

      - name: Sign orlojworker image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ steps.reg.outputs.image_worker }}@${{ steps.push-worker.outputs.digest }}"

      - name: Sign orloj-operator image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ steps.reg.outputs.image_operator }}@${{ steps.push-operator.outputs.digest }}"

      # Vulnerability scan of the published images. Scans run by digest so the
      # exact multi-arch artifact that was pushed is what gets inspected.
      # The release fails if any fixable CRITICAL/HIGH OS or library CVE is found.
      - name: Trivy scan orlojd image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: "${{ steps.reg.outputs.image_orlojd }}@${{ steps.push-orlojd.outputs.digest }}"
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy scan orlojworker image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: "${{ steps.reg.outputs.image_worker }}@${{ steps.push-worker.outputs.digest }}"
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy scan orloj-operator image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: "${{ steps.reg.outputs.image_operator }}@${{ steps.push-operator.outputs.digest }}"
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

  chart:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.4

      - name: Resolve registry + version
        id: vars
        run: |
          o=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          v="${GITHUB_REF_NAME#v}"
          echo "owner=${o}" >> "$GITHUB_OUTPUT"
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "registry=oci://ghcr.io/${o}/charts" >> "$GITHUB_OUTPUT"

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/

      - name: Build chart dependencies (from Chart.lock)
        run: helm dependency build charts/orloj

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/orloj \
            --version "${{ steps.vars.outputs.version }}" \
            --app-version "${{ github.ref_name }}" \
            --destination dist

      - name: Log in to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to OCI registry
        run: |
          helm push "dist/orloj-${{ steps.vars.outputs.version }}.tgz" \
            "${{ steps.vars.outputs.registry }}"

      - name: Attach chart tarball to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/orloj-${{ steps.vars.outputs.version }}.tgz
