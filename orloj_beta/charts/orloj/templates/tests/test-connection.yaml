apiVersion: v1
kind: Pod
metadata:
  name: {{ include "orloj.fullname" . }}-test-connection
  labels:
    {{- include "orloj.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      command:
        - wget
        - --spider
        - --timeout=5
        - http://{{ include "orloj.fullname" . }}-server:{{ .Values.server.service.port }}/healthz
