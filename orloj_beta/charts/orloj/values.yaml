# -- Global image settings
image:
  # -- Container image registry
  registry: ghcr.io
  # -- orlojd image repository
  server:
    repository: orlojhq/orloj-orlojd
    tag: ""  # defaults to appVersion
  # -- orlojworker image repository
  worker:
    repository: orlojhq/orloj-orlojworker
    tag: ""  # defaults to appVersion
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# ---------------------------------------------------------------------------
# orlojd — API server & control plane
# ---------------------------------------------------------------------------
server:
  # -- Number of orlojd replicas (1 for now; HA requires leader election)
  replicaCount: 1

  # -- Listen address inside the container
  addr: ":8080"
  # -- Container port (must match the port in addr)
  containerPort: 8080

  # -- Base URL path for the web console (e.g. "/orloj/" for subpath routing)
  uiPath: "/"

  # -- Storage backend: memory | postgres
  storageBackend: postgres

  # -- Task execution mode: sequential | message-driven
  taskExecutionMode: message-driven

  # -- Event bus backend: memory | nats
  eventBusBackend: nats

  # -- Agent message bus backend: none | memory | nats-jetstream
  agentMessageBusBackend: nats-jetstream

  # -- Run an embedded worker inside the orlojd process
  embeddedWorker: false
  embeddedWorkerMaxConcurrentTasks: 1

  # -- Log level: debug | info | warn | error
  logLevel: info
  # -- Log format: json | text
  logFormat: json

  # -- PostgreSQL connection pool settings
  postgres:
    maxOpenConns: 20
    maxIdleConns: 10
    connMaxLifetime: 30m

  # -- Reconcile interval for controllers
  reconcileInterval: 2s

  # -- Comma-separated CIDRs of trusted reverse proxies for X-Forwarded-For
  trustedProxies: ""

  # -- Additional CLI flags appended to the orlojd command
  extraArgs: []

  # -- Additional environment variables for orlojd
  extraEnv: []
  #   - name: MY_VAR
  #     value: "my-value"

  # -- Additional environment variables from secrets/configmaps
  extraEnvFrom: []

  service:
    # -- Service type: ClusterIP | LoadBalancer | NodePort
    type: ClusterIP
    # -- Service port
    port: 8080

  ingress:
    # -- Enable ingress resource
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Ingress annotations
    annotations: {}
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    # -- Ingress hosts
    hosts:
      - host: orloj.example.com
        paths:
          - path: /
            pathType: Prefix
    # -- Ingress TLS configuration
    tls: []
    #   - secretName: orloj-tls
    #     hosts:
    #       - orloj.example.com

  # -- Liveness probe settings
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5

  # -- Readiness probe settings
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # -- Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  # -- Container-level security context
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  # -- Node selector
  nodeSelector: {}
  # -- Tolerations
  tolerations: []
  # -- Affinity rules
  affinity: {}
  # -- Pod annotations
  podAnnotations: {}
  # -- Pod labels
  podLabels: {}

  serviceAccount:
    # -- Create a service account for orlojd
    create: true
    # -- Service account name (auto-generated if empty)
    name: ""
    # -- Annotations for the service account (e.g. IAM role for Bedrock)
    annotations: {}

  # -- PodDisruptionBudget
  pdb:
    enabled: false
    minAvailable: 1

  # -- Prometheus ServiceMonitor (requires prometheus-operator CRDs)
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# ---------------------------------------------------------------------------
# orlojworker — distributed task executor
# ---------------------------------------------------------------------------
worker:
  # -- Number of worker replicas
  replicaCount: 2

  # -- Worker region label
  region: default

  # -- Max concurrent tasks per worker pod
  maxConcurrentTasks: 1

  # -- Task execution mode: sequential | message-driven
  taskExecutionMode: message-driven

  # -- Agent message bus backend: none | memory | nats-jetstream
  agentMessageBusBackend: nats-jetstream

  # -- Enable runtime inbox consumers
  agentMessageConsume: true

  # -- Lease duration for claimed tasks
  leaseDuration: 30s
  # -- Heartbeat interval for lease renewal
  heartbeatInterval: 10s
  # -- Reconcile / claim interval
  reconcileInterval: 1s

  # -- Healthz listen address inside the container
  healthzAddr: ":8081"
  # -- Healthz container port (must match the port in healthzAddr)
  healthzPort: 8081

  # -- Log level: debug | info | warn | error
  logLevel: info
  # -- Log format: json | text
  logFormat: json

  # -- Declare GPU capability for this worker pool
  gpu: false
  # -- Comma-separated model IDs this worker pool supports (empty = all)
  supportedModels: ""

  # -- PostgreSQL connection pool settings
  postgres:
    maxOpenConns: 20
    maxIdleConns: 10
    connMaxLifetime: 30m

  # -- Additional CLI flags appended to the orlojworker command
  extraArgs: []

  # -- Additional environment variables
  extraEnv: []
  # -- Additional environment variables from secrets/configmaps
  extraEnvFrom: []

  # -- Liveness probe settings
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5

  # -- Readiness probe settings
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  pdb:
    enabled: true
    minAvailable: 1

  # -- HPA (requires metrics-server)
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# A2A Protocol interoperability
# ---------------------------------------------------------------------------
a2a:
  # -- Public base URL for Agent Card `url` fields (required when enabled)
  # Must be reachable by external A2A clients. Example: https://orloj.example.com
  publicBaseURL: ""
  # -- A2A protocol version to advertise. Empty defaults to latest supported.
  protocolVersion: ""
  # -- TTL for cached remote Agent Cards
  cardCacheTTL: "5m"
  # -- Allow outbound A2A requests to private/RFC1918 addresses (dangerous)
  allowPrivateEndpoints: false
  # -- Static list of remote A2A agents to register
  remoteAgents: []
  # - name: external-summarizer
  #   url: https://partner.example.com/.well-known/agent-card.json
  #   authType: bearer
  #   secretRef: partner-token
  # -- Rate limiting for A2A endpoints
  rateLimit:
    # -- Enable rate limiting on A2A endpoints
    enabled: true
    # -- Requests per minute for unauthenticated callers
    requestsPerMinute: 30
    # -- Max concurrent SSE subscribe connections globally (server-wide)
    maxConcurrentSubscriptions: 10

# ---------------------------------------------------------------------------
# Authentication & secrets
# ---------------------------------------------------------------------------
auth:
  # -- Auth mode: off | native
  mode: "off"
  # -- API bearer token (ignored when mode=native)
  apiToken: ""
  # -- Setup token for first-user bootstrap (native mode)
  setupToken: ""

# -- 256-bit AES key (hex or base64) for encrypting Secret resources at rest.
# Generate with: openssl rand -hex 32
secretEncryptionKey: ""

# -- Reference an existing Kubernetes Secret instead of creating one.
# The secret must contain keys: secret-encryption-key, api-token, setup-token
existingSecret: ""

# ---------------------------------------------------------------------------
# Tool isolation
# ---------------------------------------------------------------------------
toolIsolation:
  # -- Container isolation backend: none | container
  backend: none
  # -- Container runtime binary
  containerRuntime: docker
  # -- Default container image for sandboxed tools
  containerImage: "curlimages/curl:8.8.0"
  # -- Container network mode
  containerNetwork: none
  # -- Default container memory limit
  containerMemory: 128m
  # -- Default container CPU limit
  containerCpus: "0.50"
  # -- Default container PID limit
  containerPidsLimit: 64

  # -- Kubernetes tool isolation (independent of container backend above).
  # Tools with isolation_mode: kubernetes run as ephemeral K8s Jobs.
  kubernetes:
    # -- Enable the kubernetes tool isolation runtime
    enabled: false
    # -- Namespace for tool Jobs (defaults to release namespace)
    namespace: ""
    # -- Service account for tool Pods
    serviceAccount: ""
    # -- TTL seconds after a tool Job finishes (automatic cleanup)
    jobTTLSeconds: 300
    # -- Fallback container image for HTTP-type tools
    defaultImage: "curlimages/curl:8.8.0"

# ---------------------------------------------------------------------------
# Agent execution on Kubernetes
# ---------------------------------------------------------------------------
agentExecution:
  # -- Run agents as ephemeral K8s Jobs instead of in-process.
  # Agents whose tools require Docker fall back to in-process execution.
  kubernetes:
    # -- Enable kubernetes agent execution
    enabled: false
    # -- Namespace for agent Jobs (defaults to release namespace)
    namespace: ""
    # -- Service account for agent Pods
    serviceAccount: ""
    # -- Container image for agent Jobs (defaults to the worker image)
    image: ""
    # -- TTL seconds after an agent Job finishes (automatic cleanup)
    jobTTLSeconds: 600
    # -- Default memory limit for agent Pods
    defaultMemory: "512Mi"
    # -- Default CPU limit for agent Pods
    defaultCPU: "500m"

# -- CLI tool allowlist (comma-separated commands; empty = deny all in container mode)
cliToolAllowedCommands: ""

# ---------------------------------------------------------------------------
# NATS (subchart)
# ---------------------------------------------------------------------------
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 10Gi

# ---------------------------------------------------------------------------
# PostgreSQL (Bitnami subchart)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: orloj
    password: ""  # auto-generated if empty
    database: orloj
    existingSecret: ""
  primary:
    persistence:
      size: 10Gi

# -- External PostgreSQL DSN (used when postgresql.enabled=false)
externalPostgres:
  dsn: ""
  # -- Reference an existing K8s Secret key for the DSN
  existingSecret: ""
  existingSecretKey: "postgres-dsn"

# -- CRD conflict policy when operator is also running: off | warn | reject
crdConflictPolicy: warn

# -- External NATS URL (used when nats.enabled=false)
externalNats:
  url: ""

# ---------------------------------------------------------------------------
# orloj-operator — CRD sync controller
# ---------------------------------------------------------------------------
operator:
  # -- Enable the CRD sync operator
  enabled: false
  # -- Install CRD manifests with the chart
  installCRDs: true
  # -- Number of operator replicas
  replicaCount: 1
  image:
    # -- Operator image repository
    repository: orlojhq/orloj-operator
    # -- Operator image tag (defaults to appVersion)
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- Interval for syncing CRD status back to Kubernetes
  statusSyncInterval: 5s
  # -- Enable leader election for HA
  leaderElection: true
  # -- Healthz probe port
  healthzPort: 8081
  # -- Prometheus metrics port
  metricsPort: 8080
  # -- Prometheus ServiceMonitor (requires prometheus-operator CRDs)
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  # -- PodDisruptionBudget
  pdb:
    enabled: true
    minAvailable: 1
