# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - sh -c "cd frontend && bun install --frozen-lockfile && bun run build"

builds:
  - id: orlojd
    main: ./cmd/orlojd
    binary: orlojd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s
      - -w
      - -X=github.com/OrlojHQ/orloj/internal/version.Version={{.Version}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Commit={{.Commit}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Date={{.Date}}

  - id: orlojworker
    main: ./cmd/orlojworker
    binary: orlojworker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s
      - -w
      - -X=github.com/OrlojHQ/orloj/internal/version.Version={{.Version}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Commit={{.Commit}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Date={{.Date}}

  - id: orlojctl
    main: ./cmd/orlojctl
    binary: orlojctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s
      - -w
      - -X=github.com/OrlojHQ/orloj/internal/version.Version={{.Version}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Commit={{.Commit}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Date={{.Date}}

  - id: orloj-operator
    main: ./cmd/orloj-operator
    binary: orloj-operator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w
      - -X=github.com/OrlojHQ/orloj/internal/version.Version={{.Version}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Commit={{.Commit}}
      - -X=github.com/OrlojHQ/orloj/internal/version.Date={{.Date}}

archives:
  - id: orlojd
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .Binary }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - orlojd
    files:
      - LICENSE
      - NOTICE
      - TRADEMARKS.md

  - id: orlojworker
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .Binary }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - orlojworker
    files:
      - LICENSE
      - NOTICE
      - TRADEMARKS.md

  - id: orlojctl
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .Binary }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - orlojctl
    files:
      - LICENSE
      - NOTICE
      - TRADEMARKS.md

  - id: orloj-operator
    formats:
      - tar.gz
    name_template: "{{ .Binary }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - orloj-operator
    files:
      - LICENSE
      - NOTICE
      - TRADEMARKS.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs(\\(.+\\))?:"
      - "^chore(\\(.+\\))?:"
      - "^ci(\\(.+\\))?:"
      - Merge pull request
      - Merge branch

release:
  make_latest: true

brews:
  - name: orlojctl
    ids:
      - orlojctl
    repository:
      owner: OrlojHQ
      name: homebrew-orloj
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/OrlojHQ/orloj"
    description: "CLI for Orloj — multi-agent AI orchestration runtime"
    license: "Apache-2.0"
    install: |
      bin.install "orlojctl"
    test: |
      system "#{bin}/orlojctl", "version"
