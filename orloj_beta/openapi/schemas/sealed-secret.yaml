components:
  schemas:
    SealedValue:
      type: object
      properties:
        keyId: { type: string }
        wrappedKey:
          type: string
          description: Base64-encoded RSA-OAEP wrapped AES data key.
        ciphertext:
          type: string
          description: Base64-encoded `nonce || aes_gcm_ciphertext`.
    SealedSecretTemplateSecret:
      type: object
      properties:
        labels:
          type: object
          additionalProperties: { type: string }
        annotations:
          type: object
          additionalProperties: { type: string }
    SealedSecretSpec:
      type: object
      properties:
        encryptedData:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SealedValue"
        template:
          $ref: "#/components/schemas/SealedSecretTemplateSecret"
    SealedSecretStatus:
      type: object
      properties:
        phase: { type: string }
        lastError: { type: string }
        observedGeneration: { type: integer, format: int64 }
    SealedSecret:
      type: object
      description: |-
        Git-safe encrypted secret manifest. `orlojd` decrypts `spec.encryptedData`
        and reconciles it into a normal `Secret` with the same name and namespace.
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion: { type: string, enum: [orloj.dev/v1] }
        kind: { type: string, enum: [SealedSecret] }
        metadata: { $ref: "common.yaml#/components/schemas/ObjectMeta" }
        spec: { $ref: "#/components/schemas/SealedSecretSpec" }
        status: { $ref: "#/components/schemas/SealedSecretStatus" }
    SealedSecretList:
      allOf:
        - { $ref: "common.yaml#/components/schemas/ListMeta" }
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SealedSecret" }
    SealedSecretPublicKeyResponse:
      type: object
      required: [keyId, algorithm, publicKeyPEM]
      properties:
        keyId: { type: string }
        algorithm: { type: string }
        publicKeyPEM:
          type: string
          description: PEM-encoded RSA public key for sealing secrets client-side.
