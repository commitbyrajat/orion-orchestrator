components:
  schemas:
    ContextAdapterSpec:
      type: object
      required: [tool_ref]
      properties:
        tool_ref: { type: string }
        on_error:
          type: string
          enum: [reject, passthrough]
    ContextAdapterStatus:
      type: object
      properties:
        phase: { type: string }
        message: { type: string }
    ContextAdapter:
      type: object
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion: { type: string, enum: [orloj.dev/v1] }
        kind: { type: string, enum: [ContextAdapter] }
        metadata: { $ref: "common.yaml#/components/schemas/ObjectMeta" }
        spec: { $ref: "#/components/schemas/ContextAdapterSpec" }
        status: { $ref: "#/components/schemas/ContextAdapterStatus" }
    ContextAdapterList:
      allOf:
        - { $ref: "common.yaml#/components/schemas/ListMeta" }
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ContextAdapter" }
