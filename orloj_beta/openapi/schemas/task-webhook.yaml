components:
  schemas:
    TaskWebhookAuthSpec:
      type: object
      properties:
        profile: { type: string, description: "Auth profile: generic, github, hmac, or shared_token" }
        secret_ref: { type: string }
        signature_header: { type: string }
        signature_prefix: { type: string }
        timestamp_header: { type: string }
        max_skew_seconds: { type: integer }
        algorithm: { type: string, description: "HMAC algorithm: sha256 (default), sha1, or sha512. Used with hmac profile." }
        payload_format: { type: string, description: "HMAC payload construction: body, timestamp_dot_body, or prefix_timestamp_body. Used with hmac profile." }
        payload_prefix: { type: string, description: "Literal prefix for prefix_timestamp_body format (e.g. v0 for Slack)." }
        payload_separator: { type: string, description: "Separator between payload parts (default dot). Used with prefix_timestamp_body." }
        signature_encoding: { type: string, description: "Signature encoding: hex (default) or base64. Used with hmac profile." }
        header_format: { type: string, description: "How to parse the signature header: plain (default) or kv_pairs (comma-separated key=value)." }
        signature_key: { type: string, description: "Key holding the signature in a kv_pairs header (e.g. v1 for Stripe)." }
        timestamp_key: { type: string, description: "Key holding the timestamp in a kv_pairs header (e.g. t for Stripe)." }
    TaskWebhookIdempotency:
      type: object
      properties:
        event_id_header: { type: string, description: "HTTP header name containing the event ID for deduplication (e.g. X-Event-Id, X-GitHub-Delivery)." }
        event_id_from_body: { type: string, description: "Dot-separated field path to extract the event ID from the JSON request body (e.g. update_id, data.id). Used when the sender puts the dedup key in the body instead of a header." }
        dedupe_window_seconds: { type: integer }
    TaskWebhookPayloadSpec:
      type: object
      properties:
        mode: { type: string }
        input_key: { type: string }
    TaskWebhookSpec:
      type: object
      properties:
        task_ref: { type: string, description: "Reference to a template Task (name or namespace/name). Mutually exclusive with task_template." }
        task_template: { $ref: "task.yaml#/components/schemas/TaskSpec", description: "Inline task spec used instead of a separate template Task. Mutually exclusive with task_ref." }
        suspend: { type: boolean }
        auth: { $ref: "#/components/schemas/TaskWebhookAuthSpec" }
        idempotency: { $ref: "#/components/schemas/TaskWebhookIdempotency" }
        payload: { $ref: "#/components/schemas/TaskWebhookPayloadSpec" }
    TaskWebhookStatus:
      type: object
      properties:
        phase: { type: string }
        lastError: { type: string }
        observedGeneration: { type: integer, format: int64 }
        endpointID: { type: string }
        endpointPath: { type: string }
        lastDeliveryTime: { type: string }
        lastEventID: { type: string }
        lastTriggeredTask: { type: string }
        acceptedCount: { type: integer, format: int64 }
        duplicateCount: { type: integer, format: int64 }
        rejectedCount: { type: integer, format: int64 }
    TaskWebhook:
      type: object
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion: { type: string, enum: [orloj.dev/v1] }
        kind: { type: string, enum: [TaskWebhook] }
        metadata: { $ref: "common.yaml#/components/schemas/ObjectMeta" }
        spec: { $ref: "#/components/schemas/TaskWebhookSpec" }
        status: { $ref: "#/components/schemas/TaskWebhookStatus" }
    TaskWebhookList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/TaskWebhook" }
