components:
  schemas:
    SecretSpec:
      type: object
      properties:
        data:
          type: object
          additionalProperties: { type: string }
          description: Base64-encoded secret entries. GET responses replace values with `***`; PUT merges `***` for keys that already exist on the server.
        stringData:
          type: object
          additionalProperties: { type: string }
          description: Write-only plaintext entries (normalized into `data` as base64). Omitted on GET; on PUT, if present with `***`, values are merged from stored keys like `data`.
    SecretStatus:
      type: object
      properties:
        phase: { type: string }
        lastError: { type: string }
        observedGeneration: { type: integer, format: int64 }
    Secret:
      type: object
      description: |-
        Credential resource. GET returns `spec.data` values redacted as `***` and omits `spec.stringData`.
        PUT may send those placeholders for existing keys; the server merges stored values before validation (for `spec.data`, and for `spec.stringData` when present).
        PUT rename when `metadata.name` differs from the URL follows the same namespaced PUT rules as other resources (see root `info` and the **secrets** tag in the OpenAPI document).
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion: { type: string, enum: [orloj.dev/v1] }
        kind: { type: string, enum: [Secret] }
        metadata: { $ref: "common.yaml#/components/schemas/ObjectMeta" }
        spec: { $ref: "#/components/schemas/SecretSpec" }
        status: { $ref: "#/components/schemas/SecretStatus" }
    SecretList:
      allOf:
        - { $ref: "common.yaml#/components/schemas/ListMeta" }
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Secret" }
