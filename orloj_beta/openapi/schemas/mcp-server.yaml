components:
  schemas:
    McpServerEnvVar:
      type: object
      required: [name]
      properties:
        name: { type: string }
        value: { type: string }
        secretRef: { type: string }
        mountPath: { type: string, description: "Absolute path inside the container where the resolved value is written as a file. Only valid when spec.image is set." }
    McpToolFilter:
      type: object
      properties:
        include:
          type: array
          items: { type: string }
    McpReconnectPolicy:
      type: object
      properties:
        max_attempts: { type: integer }
        backoff: { type: string }
    McpServerSpec:
      type: object
      required: [transport]
      properties:
        transport: { type: string, enum: [stdio, http] }
        command: { type: string }
        args:
          type: array
          items: { type: string }
        env:
          type: array
          items: { $ref: "#/components/schemas/McpServerEnvVar" }
        endpoint: { type: string }
        allowPrivate:
          type: boolean
          description: |
            Permit this MCP server's HTTP transport to connect to RFC 1918 /
            ULA / carrier-grade NAT addresses, such as trusted in-cluster
            services. Loopback, link-local, cloud metadata, and unspecified
            addresses remain blocked regardless. Defaults to false and has no
            effect on stdio transport.
        image: { type: string, description: "Container image for stdio transport. When set, the MCP server runs inside a Docker container." }
        image_pull_secret: { type: string, description: "Name of a Secret containing registry credentials for pulling spec.image." }
        idle_timeout: { type: string, description: "Duration after which an idle session is reaped (e.g. 5m). 0 means never evict.", default: "0" }
        auth: { $ref: "tool.yaml#/components/schemas/ToolAuth" }
        tool_filter: { $ref: "#/components/schemas/McpToolFilter" }
        reconnect: { $ref: "#/components/schemas/McpReconnectPolicy" }
        resources: { $ref: "tool.yaml#/components/schemas/ContainerResources" }
        default_tool_runtime: { $ref: "tool.yaml#/components/schemas/ToolRuntimePolicy" }
    McpServerStatus:
      type: object
      properties:
        phase: { type: string }
        discoveredTools:
          type: array
          items: { type: string }
        generatedTools:
          type: array
          items: { type: string }
        lastSyncedAt: { type: string }
        lastError: { type: string }
        observedGeneration: { type: integer, format: int64 }
    McpServer:
      type: object
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion: { type: string, enum: [orloj.dev/v1] }
        kind: { type: string, enum: [McpServer] }
        metadata: { $ref: "common.yaml#/components/schemas/ObjectMeta" }
        spec: { $ref: "#/components/schemas/McpServerSpec" }
        status: { $ref: "#/components/schemas/McpServerStatus" }
    McpServerList:
      allOf:
        - { $ref: "common.yaml#/components/schemas/ListMeta" }
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/McpServer" }
