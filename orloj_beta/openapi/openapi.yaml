---
openapi: 3.1.0
servers:
- url: "/"
  description: Server root (set host/port when calling the API)
info:
  title: Orloj API
  version: 1.0.0
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: |-
    Control plane HTTP API for Orloj (v1).

    Most error responses use `text/plain` bodies. A future release may standardize errors as JSON for clients and tooling.

    Authentication: bearer token (`Authorization: Bearer ...`) and/or session cookie (`orloj_session`, or `__Host-orloj_session` over HTTPS). Effective requirements depend on server configuration (`ORLOJ_API_TOKEN` / `ORLOJ_API_TOKENS`, native auth mode, etc.).

    Namespaced PUT behavior: for supported replacement-style `/v1/<resource>/{name}` endpoints, request-body `metadata.name` is authoritative. When it differs from the path, the server renames the stored resource within the same namespace (HTTP 409 if the destination name already exists).
tags:
- name: agents
- name: agent-systems
- name: model-endpoints
- name: tools
- name: secrets
  description: GET responses redact `spec.data` entry values as the literal string
    `***` and omit `spec.stringData`. PUT merges `***` placeholders for existing keys
    (from `spec.data`, and from `spec.stringData` when present) so clients can rename
    or edit metadata without re-entering unchanged secrets; new keys still require
    real base64 (`spec.data`) or plaintext (`spec.stringData`). PUT may rename the
    secret when `metadata.name` differs from the path (HTTP 409 if the target name
    exists).
- name: sealed-secrets
- name: memories
- name: agent-policies
- name: agent-roles
- name: tool-permissions
- name: tool-approvals
- name: task-approvals
- name: tasks
- name: task-schedules
- name: task-webhooks
- name: workers
- name: mcp-servers
- name: a2a
  description: Agent-to-Agent (A2A) protocol endpoints. Provides Agent Card discovery,
    JSON-RPC task operations, and a registry of local and remote A2A agents.
- name: auth
- name: system
- name: events
