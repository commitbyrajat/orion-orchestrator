apiVersion: orloj.dev/v1
kind: Tool
metadata:
  name: petstore-proxy-pet-create
  namespace: orloj
spec:
  type: cli
  description: "Create a Petstore pet through the in-cluster Petstore API proxy"
  input_schema:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
        description: "Pet ID"
      name:
        type: string
        description: "Pet name"
      status:
        type: string
        enum: [available, pending, sold]
        description: "Pet status"
      photoUrl:
        type: string
        description: "Pet photo URL"
    required: [id, name, status, photoUrl]
  cli:
    command: wget
    args:
      - -qO-
      - --method=POST
      - "--header=Content-Type: application/json"
      - '--body-data={"id":{{ .id }},"name":"{{ .name }}","photoUrls":["{{ .photoUrl }}"],"tags":[{"id":1,"name":"orloj-test"}],"status":"{{ .status }}"}'
      - http://petstore-api-proxy.orloj.svc.cluster.local:8080/v2/pet
    output: stdout
  risk_level: low
  operation_classes:
    - write
  runtime:
    timeout: 30s
    isolation_mode: none
---
apiVersion: orloj.dev/v1
kind: Tool
metadata:
  name: petstore-proxy-pet-get
  namespace: orloj
spec:
  type: cli
  description: "Get a Petstore pet by ID through the in-cluster Petstore API proxy"
  input_schema:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
        description: "Pet ID"
    required: [id]
  cli:
    command: wget
    args:
      - -qO-
      - http://petstore-api-proxy.orloj.svc.cluster.local:8080/v2/pet/{{ .id }}
    output: stdout
  risk_level: low
  operation_classes:
    - read
  runtime:
    timeout: 30s
    isolation_mode: none
---
apiVersion: orloj.dev/v1
kind: Tool
metadata:
  name: petstore-proxy-pet-update
  namespace: orloj
spec:
  type: cli
  description: "Update a Petstore pet through the in-cluster Petstore API proxy"
  input_schema:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
        description: "Pet ID"
      name:
        type: string
        description: "Pet name"
      status:
        type: string
        enum: [available, pending, sold]
        description: "Pet status"
      photoUrl:
        type: string
        description: "Pet photo URL"
    required: [id, name, status, photoUrl]
  cli:
    command: wget
    args:
      - -qO-
