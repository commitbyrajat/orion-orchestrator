apiVersion: apps/v1
kind: Deployment
metadata:
  name: msme-overdraft-eligibility-api
  namespace: orloj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msme-overdraft-eligibility-api
  template:
    metadata:
      labels:
        app: msme-overdraft-eligibility-api
    spec:
      containers:
        - name: msme-overdraft-eligibility-api
          image: docker.io/rajat965ng/msme-overdraft-eligibility-example3:0.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: msme-overdraft-eligibility-api
  namespace: orloj
spec:
  type: ClusterIP
  selector:
    app: msme-overdraft-eligibility-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: msme-overdraft-eligibility-api
  namespace: orloj
spec:
  ingressClassName: nginx
  rules:
    - host: overdraft.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: msme-overdraft-eligibility-api
                port:
                  number: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: msme-openapi-to-mcp
  namespace: orloj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msme-openapi-to-mcp
  template:
    metadata:
      annotations:
        example.orloj.dev/openapi-version: "0.0.1"
      labels:
        app: msme-openapi-to-mcp
    spec:
      containers:
        - name: openapi-to-mcp
          image: evilfreelancer/openapi-to-mcp:latest
          ports:
            - containerPort: 3100
          env:
            - name: MCP_SERVER_NAME
              value: msme-mcp
            - name: MCP_PORT
              value: "3100"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_OPENAPI_SPEC
              value: "http://msme-overdraft-eligibility-api.orloj.svc.cluster.local:8080/v3/api-docs"
            - name: MCP_API_BASE_URL
              value: "http://msme-overdraft-eligibility-api.orloj.svc.cluster.local:8080"
            - name: MCP_TOOL_PREFIX
              value: "msme_"
---
apiVersion: v1
kind: Service
metadata:
  name: msme-openapi-to-mcp
  namespace: orloj
spec:
  type: ClusterIP
  selector:
    app: msme-openapi-to-mcp
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: orloj.dev/v1
kind: Memory
metadata:
  name: orion-memory
  namespace: orloj
spec:
  provider: postgres
  type: conversation
---
apiVersion: orloj.dev/v1
kind: McpServer
metadata:
  name: msme-mcp
  namespace: orloj
spec:
  transport: http
  allowPrivate: true
  endpoint: "http://msme-openapi-to-mcp.orloj.svc.cluster.local:3100/mcp"
  tool_filter:
    include:
      - msme_api_kyc_pan_pan
      - msme_api_gst_pan_pan
      - msme_api_accounts_pan_pan
      - msme_api_overdraft_evaluations
      - msme_api_overdraft_evaluate
